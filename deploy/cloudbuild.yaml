# Cloud Build pipeline — build → push → deploy to Cloud Run.
#
# Trigger manually:
#   gcloud builds submit \
#     --config deploy/cloudbuild.yaml \
#     --substitutions _REGION=europe-north1,_REPOSITORY=cloud-run-source-deploy \
#     .
#
# Or wire it up as a Cloud Build trigger on push to main:
#   gcloud builds triggers create github \
#     --name agentic-ai-engine-deploy \
#     --repo-name <REPO> --repo-owner <OWNER> \
#     --branch-pattern "^main$" \
#     --build-config deploy/cloudbuild.yaml \
#     --substitutions _IMAGE_TAG=$COMMIT_SHA
#
# Substitution variables (override on the CLI or in the trigger UI):
#   _REGION         — Artifact Registry / Cloud Run region  (default: europe-north1)
#   _REPOSITORY     — Artifact Registry repo name           (default: cloud-run-source-deploy)
#   _SERVICE_NAME   — Cloud Run service name                (default: agentic-ai-engine)
#   _GCS_BUCKET     — GCS bucket for artifact storage       (default: agentic-ai-eng-bucket)
#   _IMAGE_TAG      — image tag to build and deploy         (default: latest)
#                     Set to $COMMIT_SHA in a trigger for per-commit traceability.
#
# Built-in variables used automatically by Cloud Build:
#   $PROJECT_ID     — GCP project ID
# ---------------------------------------------------------------------------

substitutions:
  _REGION: europe-north1
  _REPOSITORY: cloud-run-source-deploy
  _SERVICE_NAME: agentic-ai-engine
  _GCS_BUCKET: agentic-ai-eng-bucket
  # Defaults to "latest" for manual submits.
  # Override with $COMMIT_SHA in an automated trigger for per-commit tags.
  _IMAGE_TAG: latest

steps:
  # ── 0. Ensure Artifact Registry repository exists ─────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: ensure-registry
    entrypoint: bash
    args:
      - -c
      - |
        gcloud artifacts repositories describe "${_REPOSITORY}" \
          --location="${_REGION}" --project="${PROJECT_ID}" 2>/dev/null \
        || gcloud artifacts repositories create "${_REPOSITORY}" \
          --repository-format=docker \
          --location="${_REGION}" --project="${PROJECT_ID}"

  # ── 1. Build the container image ──────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build
    waitFor: [ensure-registry]
    args:
      - build
      - -f
      - deploy/Dockerfile
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${_IMAGE_TAG}"
      - -t
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest"
      # Build context is the repo root (pyproject.toml, uv.lock, app/, etc.)
      - .

  # ── 2. Push both tags to Artifact Registry ─────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}"

  # ── 3. Substitute the image URL into service.yaml, then deploy ────────────
  # Uses `gcloud run services replace` so service.yaml is the single source of
  # truth for all Cloud Run configuration (resources, env vars, scaling, etc.).
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy
    waitFor: [push]
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail

        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${_IMAGE_TAG}"

        # Substitute all placeholders in service.yaml.
        sed \
          -e "s|IMAGE_PLACEHOLDER|$$IMAGE|g" \
          -e "s|PROJECT_PLACEHOLDER|${PROJECT_ID}|g" \
          -e "s|GCS_BUCKET_PLACEHOLDER|${_GCS_BUCKET}|g" \
          deploy/service.yaml > /workspace/service-rendered.yaml

        echo "Deploying image: $$IMAGE"

        gcloud run services replace /workspace/service-rendered.yaml \
          --region="${_REGION}" \
          --project="${PROJECT_ID}"

        # Set ingress to public (not supported as a service.yaml annotation).
        gcloud run services update "${_SERVICE_NAME}" \
          --ingress=all \
          --region="${_REGION}" \
          --project="${PROJECT_ID}"

        # Grant unauthenticated access (public service).
        gcloud run services add-iam-policy-binding "${_SERVICE_NAME}" \
          --region="${_REGION}" \
          --project="${PROJECT_ID}" \
          --member="allUsers" \
          --role="roles/run.invoker"

        echo "Deploy complete."
        gcloud run services describe "${_SERVICE_NAME}" \
          --region="${_REGION}" \
          --project="${PROJECT_ID}" \
          --format="value(status.url)"

# Declare the image so Cloud Build records it in its artifact metadata.
images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${_IMAGE_TAG}"
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
